name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Find APK files
        id: find_apk
        run: |
          DEBUG_APK=$(find app/build/outputs/apk -name "*.apk" 2>/dev/null | grep debug | head -1)
          RELEASE_APK=$(find app/build/outputs/apk -name "*.apk" 2>/dev/null | grep release | head -1)
          echo "DEBUG_APK=$DEBUG_APK" >> $GITHUB_OUTPUT
          echo "RELEASE_APK=$RELEASE_APK" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref_name }}
          body: |
            ## Gaming FPS Monitor - Release ${{ github.ref_name }}
            
            ### Features
            - Real-time FPS overlay monitoring
            - CPU, Memory, Temperature & Battery tracking
            - Shizuku framework integration
            
            ### Installation
            Download APK and enable Shizuku on your device
          draft: false
          prerelease: false

      - name: Upload Debug APK
        if: steps.find_apk.outputs.DEBUG_APK != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.find_apk.outputs.DEBUG_APK }}
          asset_name: Gaming-FPS-Monitor-${{ github.ref_name }}-debug.apk
          asset_content_type: application/vnd.android.package-archive

      - name: Upload Release APK
        if: steps.find_apk.outputs.RELEASE_APK != ''
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ secrets.create_release.outputs.upload_url }}
          asset_path: ${{ steps.find_apk.outputs.RELEASE_APK }}
          asset_name: Gaming-FPS-Monitor-${{ github.ref_name }}-release.apk
          asset_content_type: application/vnd.android.package-archive
          
