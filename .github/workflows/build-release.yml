name: Build and Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Find APK files
        id: find_apk
        run: |
          DEBUG_APK=$(find app/build/outputs/apk -name "*.apk" 2>/dev/null | grep debug | head -1)
          RELEASE_APK=$(find app/build/outputs/apk -name "*.apk" 2>/dev/null | grep release | head -1)
          echo "DEBUG_APK=$DEBUG_APK" >> $GITHUB_OUTPUT
          echo "RELEASE_APK=$RELEASE_APK" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Gaming FPS Monitor - Release ${{ github.ref_name }}
            
            ### Features
            - Real-time FPS overlay monitoring
            - CPU, Memory, Temperature & Battery tracking
            - Shizuku framework integration
            
            ### Installation
            Download APK and enable Shizuku on your device
          draft: false
          prerelease: false
          files: |
            ${{ steps.find_apk.outputs.DEBUG_APK }}
            ${{ steps.find_apk.outputs.RELEASE_APK }}
